name: OrbitalStrike
version: ${version}
main: com.NguyenDevs.orbitalstrike.OrbitalStrike
prefix: OrbitalStrike
api-version: '1.21'
author: NguyenDevs
description: Advanced Orbital Strike Cannon system
website: https://github.com/NguyenDevs/Orbitalstrike
softdepend: [WorldGuard]

commands:
  cannon:
    description: Main orbital strike cannon command
    usage: |-
      /cannon create <name> [payload] - Create a cannon at your location
      /cannon remove <name> - Remove a cannon
      /cannon list - List all cannons
      /cannon fire <cannon> - Fire cannon at crosshair
      /cannon info <cannon> - Show info for a cannon
      /cannon target <cannon> <x> <y> <z> - Fire at coordinates
      /cannon give <player> <cannon> - Give targeting tool for a cannon
      /cannon set <cannon> <parameter> <value> - Set a parameter for a cannon
      /cannon reload - Reload configuration
    aliases: [osc, os]
    permission: orbitalstrike.use

permissions:
  orbitalstrike.*:
    description: All orbital strike permissions
    children:
      orbitalstrike.use: true
      orbitalstrike.admin: true
      orbitalstrike.craft.*: true

  orbitalstrike.use:
    description: Use orbital strike cannons
    default: true

  orbitalstrike.admin:
    description: Create and manage cannons
    default: op

  orbitalstrike.craft.*:
    description: Craft all orbital strike items
    default: op
    children:
      orbitalstrike.craft.stab_recipe: true
      orbitalstrike.craft.nuke_recipe: true
      orbitalstrike.craft.recursion_recipe: true
      orbitalstrike.craft.emp_recipe: true

  orbitalstrike.craft.stab_recipe:
    description: Craft stab cannon tool
    default: op

  orbitalstrike.craft.nuke_recipe:
    description: Craft nuke cannon tool
    default: op

  orbitalstrike.craft.recursion_recipe:
    description: Craft recursion cannon tool
    default: op

  orbitalstrike.craft.emp_recipe:
    description: Craft emp cannon tool
    default: op

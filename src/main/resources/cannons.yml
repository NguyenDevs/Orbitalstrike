# ==========================================
# Orbital Strike Cannon Examples
# ==========================================
# This file contains example cannons for each payload type.
# Use these as a reference to create your own devastating weaponry!

cannons:
  stab_example:
    name: "Stab Example"
    item:
      - material: FISHING_ROD
      - durability: true
      - max-durability: 5
    cooldown: 30
    payload:
      type: STAB
      settings:
        - yield: 8.0
        - offset: 0.3
        - vertical-step: 2

  nuke_example:
    name: "Nuke Example"
    item:
      - material: BLAZE_ROD
      - durability: true
      - max-durability: 3
    cooldown: 120
    payload:
      type: NUKE
      settings:
        - yield: 10.0
        - height: 60.0
        - rings: 8
        - base-tnt: 15
        - tnt-increase: 2

  recursion_example:
    name: "Recursion Example"
    item:
      - material: NETHER_STAR
      - durability: false
    cooldown: 60
    payload:
      type: RECURSION
      settings:
        - yield: 10.0
        - height: 100.0
        - level: 3
        - amount: 4

  emp_example:
    name: "EMP Example"
    item:
      - material: PRISMARINE_CRYSTALS
      - durability: true
      - max-durability: 8
    cooldown: 60
    payload:
      type: EMP
      settings:
        - radius: 15.0
        - pulses: 8
        - pulse-delay: 20
        - pulse-speed: 2.5
        - blindness-duration: 100
        - weakness-duration: 600
